name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type and Astro check
        run: pnpm check

      - name: Content lint
        run: pnpm content:lint --published

      - name: Build
        run: pnpm build

      - name: SEO smoke test
        run: pnpm seo:smoke

      - name: Create Pages project
        if: github.event_name != 'pull_request'
        run: pnpm dlx wrangler@3.90.0 pages project create objectstack-ai --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        if: github.event_name != 'pull_request'
        run: pnpm dlx wrangler@3.90.0 pages deploy dist --project-name=objectstack-ai --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
